<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação - Escola Básica de Vatiua</title>
    <link rel="icon" href="img/icons/house-building.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ========== HEADER ========== -->
        <header>
            <div class="header-content">
                <div class="logo">
                    <img src="img/icons/house-building.svg" alt="Escola" class="icon-logo">
                    <h1>ESCOLA BÁSICA DE VATIUA</h1>
                </div>
            </div>
        </header>

        <!-- ========== BODY ========== -->
        <main>
            <h2>👀 CONFIRME OS SEUS DADOS</h2>
            <p class="descricao-confirmacao">Verifique se os dados estão correctos:</p>

            <div class="dados-confirmar">
                <p><strong>Função:</strong> <span id="confirmar-funcao">-</span></p>
                <p><strong>Nome:</strong> <span id="confirmar-nome">-</span></p>
                <p><strong>Sexo:</strong> <span id="confirmar-sexo">-</span></p>
                <p><strong>Calçado:</strong> <span id="confirmar-calcado">-</span></p>
                <p><strong>Roupa:</strong> <span id="confirmar-roupa">-</span></p>
                <p><strong>Distância:</strong> <span id="confirmar-distancia">-</span></p>
            </div>

            <div class="botoes-confirmar">
                <button id="btn-corrigir" class="btn-corrigir">
                    <img src="img/icons/edit.svg" alt="Editar" class="icon-btn"> CORRIGIR
                </button>
                <button id="btn-confirmar" class="btn-confirmar">
                    <img src="img/icons/check-circle.svg" alt="Confirmar" class="icon-btn"> CONFIRMAR ENVIO
                </button>
                <button id="btn-cancelar" class="btn-cancelar">
                    <img src="img/icons/cross-circle.svg" alt="Cancelar" class="icon-btn"> CANCELAR
                </button>
            </div>

            <a href="formulario.html" class="link-voltar">
                <img src="img/icons/arrow-left.svg" alt="Voltar" class="icon-link"> Voltar ao formulário
            </a>
        </main>

        <!-- ========== FOOTER ========== -->
        <footer>
            <p class="footer-local">Vatiua - 2026</p>
            <p class="footer-dev">Plataforma desenvolvida por Mahadura</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
